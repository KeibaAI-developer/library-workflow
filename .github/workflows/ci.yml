name: CI

on:
  workflow_call:
    inputs:
      package_name:
        description: 'パッケージのディレクトリ名'
        required: true
        type: string
      repo_name:
        description: 'リポジトリ名（キャッシュキー用）'
        required: true
        type: string
      run_unit_test:
        description: '単体テストを実行するかどうか'
        required: false
        type: boolean
        default: true
      run_integration_test:
        description: '結合テストを実行するかどうか'
        required: false
        type: boolean
        default: false
      dependency_library:
        description: '依存ライブラリのリスト（スペース区切り。例: "keiba-scraping mykeibadb-python@v1.0.0"）。lib@refの形式でrefを指定可能。省略時はmainを使用。'
        required: false
        type: string
        default: ''

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ inputs.repo_name }}-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ inputs.repo_name }}-${{ runner.os }}-pip-
            ${{ runner.os }}-pip-

      - name: Install dependency libraries
        if: ${{ inputs.dependency_library != '' }}
        env:
          DEPENDENCY_LIBRARY: ${{ inputs.dependency_library }}
        run: |
          python -m pip install --upgrade pip
          for lib_ref in $DEPENDENCY_LIBRARY; do
            lib="${lib_ref%%@*}"
            ref="${lib_ref#*@}"
            if [ "$lib" = "$ref" ]; then ref="main"; fi
            pip install "git+https://github.com/KeibaAI-developer/$lib.git@$ref"
          done

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run isort check
        run: |
          echo "::group::isort check"
          isort --profile=black --line-length=100 --check-only --diff \
            ${{ inputs.package_name }}/ \
            test/
          echo "::endgroup::"

      - name: Run flake8
        run: |
          echo "::group::flake8 check"
          flake8 \
            ${{ inputs.package_name }}/ \
            test/ \
            --max-line-length=100 \
            --ignore=E203,W503,ANN101,ANN204,ANN401,D105,D107,D403,D415,DAR101,DAR201,DAR402 \
            --select=E,W,F,N,D \
            --docstring-convention=google \
            --statistics
          echo "::endgroup::"

      - name: Run mypy
        run: |
          echo "::group::mypy check"
          mypy ${{ inputs.package_name }}/
          echo "::endgroup::"

  test:
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ inputs.repo_name }}-test-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ inputs.repo_name }}-test-${{ runner.os }}-pip-
            ${{ runner.os }}-pip-

      - name: Install dependency libraries
        if: ${{ inputs.dependency_library != '' }}
        env:
          DEPENDENCY_LIBRARY: ${{ inputs.dependency_library }}
        run: |
          python -m pip install --upgrade pip
          for lib_ref in $DEPENDENCY_LIBRARY; do
            lib="${lib_ref%%@*}"
            ref="${lib_ref#*@}"
            if [ "$lib" = "$ref" ]; then ref="main"; fi
            pip install "git+https://github.com/KeibaAI-developer/$lib.git@$ref"
          done

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit test
        if: ${{ inputs.run_unit_test }}
        run: |
          pytest test/unit -v --cov=${{ inputs.package_name }} --cov-report=xml --cov-report=term-missing

      - name: Run integration test
        if: ${{ inputs.run_integration_test }}
        run: |
          pytest test/integration -v --cov=${{ inputs.package_name }} --cov-append --cov-report=xml --cov-report=term-missing
